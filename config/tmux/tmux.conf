# =============================================================================
# tmux 設定 (Nix / フォールバック両対応)
#
# このファイルは:
#   - home/tmux.nix から builtins.readFile で読み込まれる
#   - bin/setup-*.sh フォールバック経由で ~/.config/tmux/tmux.conf へ symlink される
# =============================================================================

# ----------------------------------------
# 基本設定
# ----------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set -g renumber-windows on
setw -g mode-keys vi

# 設定リロード
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ----------------------------------------
# vi コピーモード
# ----------------------------------------
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi H   send-keys -X start-of-line
bind-key -T copy-mode-vi L   send-keys -X end-of-line

# ----------------------------------------
# ペイン操作 (vim 風)
# ----------------------------------------

# 分割: v で縦分割, s で横分割
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ペイン移動: hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ: Shift + hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ----------------------------------------
# ステータスバー (WezTerm 風: 画面下ギリギリ・パワーライン)
#   配色: bar=#0b0f16 / inactive=#1a222e / active=#00d4ff(Neon Cyan)
#   アイコン: Nerd Font 必須 (Hack Nerd Font Propo)
# ----------------------------------------
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#0b0f16,fg=#7aa2f7"
set -g status-left-length 60
set -g status-right-length 120

# 左側: セッション名 + パワーライン
set -g status-left "#[fg=#0f1419,bg=#00d4ff,bold]  #S #[fg=#00d4ff,bg=#0b0f16,nobold]"

# 右側: folder / Mac / 時刻 (アイコン付き)
set -g status-right "#[fg=#1a222e,bg=#0b0f16]#[fg=#7aa2f7,bg=#1a222e]  #(basename '#{pane_current_path}') #[fg=#00d4ff,bg=#1a222e]#[fg=#0f1419,bg=#00d4ff,bold]  #h #[fg=#1a222e,bg=#00d4ff]#[fg=#7aa2f7,bg=#1a222e]  %H:%M "

# ウィンドウタブ (パワーライン区切り)
setw -g window-status-separator ""
setw -g window-status-format         "#[fg=#0b0f16,bg=#1a222e]#[fg=#7aa2f7,bg=#1a222e]  #I  #W #[fg=#1a222e,bg=#0b0f16]"
setw -g window-status-current-format "#[fg=#0b0f16,bg=#00d4ff]#[fg=#0f1419,bg=#00d4ff,bold]  #I  #W #[fg=#00d4ff,bg=#0b0f16]"

# ペインボーダー
set -g pane-border-style        "fg=#1f2335"
set -g pane-active-border-style "fg=#00d4ff"

# ----------------------------------------
# 便利機能
# ----------------------------------------

# 新しいウィンドウでカレントパスを引き継ぐ
bind c new-window -c "#{pane_current_path}"

# 同時入力トグル
bind S setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"

# 新しいセッション作成
bind C new-session

# ペインを確認なしで閉じる
bind X kill-pane

# 最後のウィンドウに切り替え
bind Tab last-window

# ペインにマーク
bind m select-pane -m

# ----------------------------------------
# クリップボード連携 (macOS)
# ----------------------------------------
if-shell "uname | grep -q Darwin" \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'
